services:
  # -----------------------------------------------------------------
  # 1. BANCO DE DADOS
  # -----------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: inovatu-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - inovatu-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # -----------------------------------------------------------------
  # 2. BACKEND (Spring Boot) - Roda com permissão compartilhada
  # -----------------------------------------------------------------
  backend:
    build:
      context: ./backend/inovatu
      dockerfile: Dockerfile
    container_name: inovatu-backend
    restart: always
    # Força o container a rodar com UID 1000 e GID 1002
    user: "${PUID}:${PGID}"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./config/backend:/app/config
      - ./data/backend:/var/log/inovatu
    ports:
      - "8080:8080"
    networks:
      - inovatu-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # -----------------------------------------------------------------
  # 3. FRONTEND (Nginx)
  # -----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inovatu-frontend
    restart: always
    ports:
      - "4200:80"
      - "443:443"
    volumes:
      - ./config/frontend/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/frontend:/var/log/nginx
    networks:
      - inovatu-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

networks:
  inovatu-net:
    driver: bridge